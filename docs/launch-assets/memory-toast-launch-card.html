<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="ds-template-size" content="1080x1080" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&family=Noto+Serif+TC:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        font-family: "Noto Sans TC", system-ui, sans-serif;
        color: #333333;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      .canvas {
        position: relative;
        width: 1080px;
        height: 1080px;
        overflow: hidden;
        padding: 76px;
        background:
          radial-gradient(circle at 87% 24%, #c3f432 0 124px, transparent 125px),
          radial-gradient(circle at 103% 24%, #7258ff 0 124px, transparent 125px),
          linear-gradient(180deg, #ffffff 0%, #f5f3ff 100%);
      }
      .content {
        position: relative;
        z-index: 1;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .kicker {
        display: inline-flex;
        align-items: center;
        padding: 8px 18px;
        border-radius: 999px;
        background: #c3f432;
        color: #333333;
        font-size: 24px;
        line-height: 1;
        font-weight: 700;
      }
      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        min-height: 48px;
        padding: 0 16px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: inset 0 0 0 1px rgba(51, 51, 51, 0.08);
        color: #333333;
        font-size: 25px;
        font-weight: 700;
      }
      .brand-mark {
        position: relative;
        width: 48px;
        height: 34px;
      }
      .brand-mark::before,
      .brand-mark::after {
        content: "";
        position: absolute;
        top: 0;
        width: 34px;
        height: 34px;
        border-radius: 50%;
      }
      .brand-mark::before {
        left: 0;
        background: #c3f432;
      }
      .brand-mark::after {
        right: 0;
        background: #7258ff;
      }
      .main {
        max-width: 760px;
      }
      .toast {
        width: 96px;
        height: 96px;
        display: grid;
        place-items: center;
        margin-bottom: 34px;
        border-radius: 50%;
        background: #c3f432;
        font-size: 58px;
        line-height: 1;
      }
      h1 {
        margin: 0;
        font-family: "Noto Serif TC", serif;
        font-size: 78px;
        line-height: 1.13;
        font-weight: 700;
        letter-spacing: 0;
      }
      h1 span {
        color: #7258ff;
      }
      .deck {
        margin: 28px 0 0;
        max-width: 820px;
        color: #808080;
        font-size: 30px;
        line-height: 1.5;
        font-weight: 500;
      }
      .points {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 18px;
        margin-top: 58px;
      }
      .point {
        min-height: 126px;
        padding: 22px 22px 20px;
        border: 1px solid #dddddd;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.78);
      }
      .point b {
        display: block;
        color: #7258ff;
        font-size: 20px;
        line-height: 1;
        margin-bottom: 16px;
      }
      .point span {
        display: block;
        color: #333333;
        font-size: 24px;
        line-height: 1.32;
        font-weight: 700;
      }
      .bottom {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 28px;
      }
      .credit {
        color: #808080;
        font-size: 22px;
        line-height: 1.45;
      }
      .credit strong {
        color: #333333;
        font-weight: 700;
      }
      .cta {
        display: inline-flex;
        align-items: center;
        min-height: 58px;
        padding: 0 24px;
        border-radius: 999px;
        background: #7258ff;
        color: #ffffff;
        font-size: 24px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="canvas">
      <div class="content">
        <header class="top">
          <div class="kicker">Your writing matters</div>
          <div class="brand">
            <span class="brand-mark" aria-hidden="true"></span>
            <span>Matters</span>
          </div>
        </header>

        <main>
          <div class="main">
            <div class="toast" aria-hidden="true">🍞</div>
            <h1>Matters <span>記憶吐司</span></h1>
            <p class="deck">你的文字，也可以自己好好收著。五分鐘內，備份、保存、蓋一個自己的部落格。</p>
          </div>
          <div class="points">
            <div class="point"><b>01</b><span>一鍵下載所有文章</span></div>
            <div class="point"><b>02</b><span>備份到分散式儲存</span></div>
            <div class="point"><b>03</b><span>打包成自己的部落格</span></div>
          </div>
        </main>

        <footer class="bottom">
          <div class="credit">
            <strong>Matters 團隊與豆泥</strong><br />
            內容自主 · 資料可攜
          </div>
          <div class="cta">lifeboat.matters.town</div>
        </footer>
      </div>
    </div>
  </body>
</html>
